<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Aftr — Where Alicante's locals and internationals actually meet</title>
    <meta name="description" content="Weekly in-person events in Alicante and Elche. Chat & Mingle, Digital Builders, Lingo Connect, Hub Cultural, Unplug & Play. Join 2,220+ members." />
    <meta name="author" content="Aftr Events & Comunidades" />
    <meta name="theme-color" content="#b85c24" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn previews) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Aftr" />
    <meta property="og:title"       content="Aftr — Where Alicante's locals and internationals actually meet" />
    <meta property="og:description" content="Weekly in-person events in Alicante and Elche. Join 2,220+ members from 50+ countries." />
    <meta property="og:url"         content="https://aftr.es" />
    <!-- Replace with a real photo of an Aftr event — 1200×630px recommended -->
    <meta property="og:image"       content="https://aftr.es/og-image.jpg" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@aftrsocialclub" />
    <meta name="twitter:title"       content="Aftr — Where Alicante's locals and internationals actually meet" />
    <meta name="twitter:description" content="Weekly in-person events in Alicante and Elche. Join 2,220+ members from 50+ countries." />
    <meta name="twitter:image"       content="https://aftr.es/og-image.jpg" />

    <!-- Favicon — SVG (works in all modern browsers) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fallback PNG favicon (for older browsers) — generate from favicon.svg -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
